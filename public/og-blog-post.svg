<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad)" />

  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="120" fill="rgba(99,102,241,0.1)" />
  <circle cx="1100" cy="550" r="160" fill="rgba(99,102,241,0.08)" />
  <line x1="0" y1="520" x2="1200" y2="520" stroke="rgba(255,255,255,0.1)" stroke-width="1" />

  <!-- Notebook lines decoration -->
  <line x1="80" y1="180" x2="80" y2="450" stroke="rgba(99,102,241,0.3)" stroke-width="2" />
  <line x1="100" y1="200" x2="500" y2="200" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
  <line x1="100" y1="240" x2="450" y2="240" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
  <line x1="100" y1="280" x2="400" y2="280" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

  <!-- Content -->
  <text x="600" y="250" font-family="Georgia, serif" font-size="28" fill="rgba(99,102,241,0.9)" text-anchor="middle" font-weight="normal" letter-spacing="4">
    KNOWLEDGE BLOG
  </text>

  <text x="600" y="330" font-family="Arial, sans-serif" font-size="56" fill="white" text-anchor="middle" font-weight="bold">
    Chaowalit Greepoke
  </text>

  <text x="600" y="390" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    Business · Technology · Design · Solopreneur
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="rgba(0,0,0,0.3)" />
  <text x="600" y="608" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)" text-anchor="middle">
    bookchaowalit.com/blog
  </text>
